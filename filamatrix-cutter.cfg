# FilamATrix Standalone Filament Cutter Macros
# Independent of AFC or Happy Hare systems
# Reference: https://github.com/thunderkeys/FilamATrix
# Reference: https://github.com/sorted01/Filametrix

[gcode_macro _FILAMATRIX_VARS]
# Cutter position variables - CALIBRATED 2026-01-31
variable_cutter_x: 10               # X position where cutting blade just touches (CALIBRATED)
variable_cutter_y: 265              # Y position where cutting blade engages (CALIBRATED)
variable_cutter_z: 50               # Z height for cutting operation (safe height above bed)

# Movement speeds
variable_travel_speed: 18000        # Speed for travel moves (mm/min)
variable_cut_speed: 600             # Speed for cutting engagement (mm/min)

# Cutting movement distances
variable_engage_distance: 10        # Distance to move to engage blade fully (CALIBRATED: X=10 to X=0)
variable_retract_after_cut: 10      # Filament retraction after cut (mm)

gcode:
    # This macro holds variables only, no gcode execution

[gcode_macro CUT_FILAMENT]
description: Cut filament using FilamATrix cutter
gcode:
    {% set vars = printer["gcode_macro _FILAMATRIX_VARS"] %}

    # Home if not already homed
    _HOME_IF_NEEDED

    SAVE_GCODE_STATE NAME=cut_filament_state

    # Ensure we're in absolute positioning
    G90

    # Move to cutting position at safe Z height
    G1 X{vars.cutter_x} Y{vars.cutter_y} Z{vars.cutter_z} F{vars.travel_speed}

    # Engage cutting blade (move toward X=0)
    G1 X{vars.cutter_x - vars.engage_distance} F{vars.cut_speed}

    # Wait a moment for clean cut
    G4 P500

    # Move away from blade
    G1 X{vars.cutter_x} F{vars.travel_speed}

    # Retract filament after cut
    G91  # Relative positioning
    G1 E-{vars.retract_after_cut} F300
    G90  # Back to absolute

    RESTORE_GCODE_STATE NAME=cut_filament_state

    { action_respond_info("Filament cut complete") }

[gcode_macro CALIBRATE_CUTTER]
description: Manual calibration helper for FilamATrix cutter position
gcode:
    {% set vars = printer["gcode_macro _FILAMATRIX_VARS"] %}

    { action_respond_info("Moving to current cutter position for calibration") }
    { action_respond_info("Current position: X=%.1f Y=%.1f Z=%.1f" % (vars.cutter_x, vars.cutter_y, vars.cutter_z)) }

    SAVE_GCODE_STATE NAME=calibrate_cutter_state

    G90
    G1 X{vars.cutter_x} Y{vars.cutter_y} Z{vars.cutter_z} F{vars.travel_speed}

    { action_respond_info("Now at cutter position. Use these commands:") }
    { action_respond_info("  - Jog toolhead in 1mm increments to find engagement point") }
    { action_respond_info("  - Note coordinates when blade is nearly engaged") }
    { action_respond_info("  - Note coordinates when blade is fully depressed") }
    { action_respond_info("  - Update _FILAMATRIX_VARS in filamatrix-cutter.cfg with calibrated values") }

    RESTORE_GCODE_STATE NAME=calibrate_cutter_state

[gcode_macro TEST_CUTTER]
description: Test cutter movement without actually cutting (no filament retraction)
gcode:
    {% set vars = printer["gcode_macro _FILAMATRIX_VARS"] %}

    { action_respond_info("Testing cutter movement - NO FILAMENT RETRACTION") }

    # Home if not already homed
    _HOME_IF_NEEDED

    SAVE_GCODE_STATE NAME=test_cutter_state

    G90
    G1 X{vars.cutter_x} Y{vars.cutter_y} Z{vars.cutter_z} F{vars.travel_speed}
    { action_respond_info("At starting position") }
    G4 P1000

    G1 X{vars.cutter_x - vars.engage_distance} F{vars.cut_speed}
    { action_respond_info("Blade engaged") }
    G4 P2000

    G1 X{vars.cutter_x} F{vars.travel_speed}
    { action_respond_info("Blade released") }

    RESTORE_GCODE_STATE NAME=test_cutter_state

    { action_respond_info("Test complete - check if blade engaged correctly") }
